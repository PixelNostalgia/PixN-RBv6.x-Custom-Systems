<?xml version="1.0" encoding="UTF-8"?>
<!-- *** es_systems.cfg edited for RetroBat by PixN TEAM ***-->
<systemList>
  <system>
    <name>mame-aknf</name>
    <fullname>MAME All Killer No Filler</fullname>
    <manufacturer>Arcade</manufacturer>
    <release/>
    <hardware>arcade</hardware>
    <path>~\..\roms\mame-aknf</path>
    <extension>.zip .7z</extension>
    <command>"%HOME%\emulatorLauncher.exe" -gameinfo %GAMEINFOXML% %CONTROLLERSCONFIG% -system %SYSTEM% -emulator %EMULATOR% -core %CORE% -rom %ROM%</command>
    <emulators>
      <emulator name="libretro">
        <cores>
          <core>mame</core>
        </cores>
      </emulator>
      <emulator name="mame64"/>
      <emulator name="groovymame"/>
    </emulators>
    <platform>arcade</platform>
    <theme>mame-aknf</theme>
  </system>
</systemList>