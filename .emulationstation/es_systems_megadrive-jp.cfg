<?xml version="1.0" encoding="UTF-8"?>
<!-- *** es_systems.cfg edited for RetroBat by PixN TEAM ***-->
<systemList>
  <system>
    <name>megadrive-jp</name>
    <fullname>Megadrive (Japan)</fullname>
    <manufacturer>Sega</manufacturer>
    <release>1988</release>
    <hardware>console</hardware>
    <path>~\..\roms\megadrive-jp</path>
    <extension>.md .bin</extension>
    <command>"%HOME%\emulatorLauncher.exe" -gameinfo %GAMEINFOXML% %CONTROLLERSCONFIG% -system %SYSTEM% -emulator %EMULATOR% -core %CORE% -rom %ROM%</command>
    <emulators>
      <emulator name="libretro">
        <cores>
          <core>genesis_plus_gx</core>
          <core>genesis_plus_gx_wide</core>
          <core>picodrive</core>
          <core>fbneo</core>
        </cores>
      </emulator>
      <emulator name="mednafen">
        <core>megadrive</core>
      </emulator>
      <emulator name="ares">
        <core>MegaDrive</core>
      </emulator>
      <emulator name="kega-fusion">
        <cores>
          <core>auto</core>
          <core>megadrive</core>
          <core>genesis</core>
        </cores>
      </emulator>
      <emulator name="bizhawk">
        <core>Genplus-gx</core>
      </emulator>
      <emulator name="jgenesis"/>
    </emulators>
    <group>megadrive</group>
    <platform>megadrive,genesis</platform>
    <theme>megadrive-jp</theme>
  </system>
</systemList>